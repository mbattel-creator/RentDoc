<style>
/* Native iOS-Systemschriften (SF Pro) – kein externer Font, vollständig offline */
/* ============================================================
   ÜBERGABE — Design System
   Direction: "Vermessungsinstrument" — präzise, ruhig, dokumentarisch.
   Signature: der Grundriss als Karte mit nummerierten Pins (Fadenkreuz).
   ============================================================ */
:root{
  /* palette — iOS 26 grouped */
  --paper:#F2F2F7;        /* systemGroupedBackground */
  --paper-2:#E9E9EE;
  --surface:#FFFFFF;
  --ink:#1C1C1E;
  --ink-2:#3A3A3C;
  --ink-3:#6C6C70;
  --ink-4:#9C9CA1;
  --line:#D9D9DE;
  --line-2:#E7E7EC;

  --brand:#0F3D45;        /* deep teal — Marken-/Tint-Akzent */
  --brand-600:#13525E;
  --brand-500:#1A6B79;
  --brand-300:#5BA3AE;
  --brand-tint:#E5EFF0;
  --brand-tint-2:#F0F6F6;
  --accent:#C9622B;
  --accent-tint:#FBEDE4;

  /* iOS system semantic */
  --ios-red:#FF3B30;
  --ios-red-tint:#FFE9E7;
  --fill-2:#EEEEF1;       /* secondary system fill (tinted buttons) */
  --fill-3:#E4E4E9;

  /* severity scale */
  --sev-keine:#5E6F73;
  --sev-gering:#C99A12;
  --sev-mittel:#D9712B;
  --sev-erheblich:#C7382F;
  --ok:#2E7D52;
  --ok-tint:#E5F2EA;
  --warn:#B8860B;
  --warn-tint:#FBF1DA;
  --err:#FF3B30;
  --err-tint:#FFE9E7;
  --ink-1:#1C1C1E;

  /* type — native SF system stack */
  --f-display:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",system-ui,sans-serif;
  --f-body:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,sans-serif;
  --f-mono:ui-monospace,"SF Mono",Menlo,monospace;

  /* shape — iOS rounded */
  --r-xs:7px; --r-sm:10px; --r-md:14px; --r-lg:18px; --r-xl:26px;
  --sh-1:0 1px 2px rgba(19,25,27,.05),0 1px 1px rgba(19,25,27,.04);
  --sh-2:0 4px 14px rgba(19,25,27,.07),0 1px 3px rgba(19,25,27,.05);
  --sh-3:0 16px 44px rgba(19,25,27,.13),0 4px 12px rgba(19,25,27,.08);
  --sh-glass:0 1px 0 rgba(255,255,255,.5) inset,0 6px 22px rgba(19,25,27,.12);
  --sh-pin:0 3px 8px rgba(15,61,69,.35);

  --nav-w:266px;
  --ease:cubic-bezier(.22,.61,.36,1);
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--f-body);
  background:var(--paper);
  color:var(--ink);
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  letter-spacing:-0.006em;
}
h1,h2,h3,h4{font-family:var(--f-display);font-weight:600;letter-spacing:-0.02em;margin:0;color:var(--ink)}
.mono{font-family:var(--f-mono)}
button{font-family:inherit}
:focus-visible{outline:2.5px solid var(--brand-500);outline-offset:2px;border-radius:4px}
::selection{background:var(--brand-tint);color:var(--brand)}
img{max-width:100%;display:block}
input,textarea,select{font-family:inherit;font-size:15px;color:var(--ink)}

@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms !important;transition-duration:.001ms !important}
}

/* ---------- App shell ---------- */
#app{min-height:100dvh;display:flex;flex-direction:column}

.app-shell{display:flex;min-height:100dvh}

/* sidebar (desktop) */
.nav{
  width:var(--nav-w);flex:0 0 var(--nav-w);
  background:linear-gradient(180deg,#0E3941,#0B2D34);
  color:#CFE0E2;
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100dvh;
  z-index:40;
}
.nav-brand{padding:22px 22px 16px;display:flex;align-items:center;gap:11px}
.nav-mark{
  width:34px;height:34px;border-radius:9px;flex:0 0 34px;
  background:radial-gradient(circle at 30% 28%,#3D8C99,#0F3D45);
  display:grid;place-items:center;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12);
}
.nav-mark svg{width:19px;height:19px}
.nav-brand .wm{font-family:var(--f-display);font-weight:600;font-size:16px;color:#fff;letter-spacing:-.01em;line-height:1}
.nav-brand .ws{font-size:11px;color:#7FA6AC;letter-spacing:.04em;margin-top:3px;text-transform:uppercase}

.nav-scroll{flex:1;overflow-y:auto;padding:6px 12px 12px}
.nav-section-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.11em;color:#6A949B;padding:14px 12px 6px;font-weight:600}
.nav-item{
  display:flex;align-items:center;gap:12px;width:100%;text-align:left;
  background:transparent;border:0;color:#BBD2D5;cursor:pointer;
  padding:9px 12px;border-radius:9px;font-size:14px;font-weight:500;
  transition:background .15s var(--ease),color .15s var(--ease);position:relative;
}
.nav-item .ni-ic{width:18px;height:18px;flex:0 0 18px;opacity:.85}
.nav-item .ni-badge{margin-left:auto;font-family:var(--f-mono);font-size:11px;background:rgba(255,255,255,.09);color:#CFE0E2;padding:1px 7px;border-radius:20px;min-width:22px;text-align:center}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:rgba(91,163,174,.20);color:#fff}
.nav-item.active::before{content:"";position:absolute;left:-12px;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:#5BA3AE}
.nav-item.done .ni-ic{color:#79C7A6}
.nav-foot{padding:12px;border-top:1px solid rgba(255,255,255,.08)}
.nav-foot .saved{display:flex;align-items:center;gap:8px;font-size:12px;color:#7FA6AC}
.nav-foot .dot{width:7px;height:7px;border-radius:50%;background:#79C7A6;box-shadow:0 0 0 3px rgba(121,199,166,.18)}

/* main */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:30;
  background:rgba(248,248,250,.72);backdrop-filter:saturate(1.8) blur(20px);-webkit-backdrop-filter:saturate(1.8) blur(20px);
  border-bottom:.5px solid rgba(60,60,67,.16);
  padding:calc(10px + var(--safe-t)) clamp(14px,3vw,34px) 10px;
  display:flex;align-items:center;gap:12px;min-height:54px;
}
.topbar .crumb{font-size:12.5px;color:var(--ink-3);font-weight:500}

/* ---------- Buttons (iOS) ---------- */

/* ---------- Modal → iOS Sheet ---------- */
.modal-bg{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.4);backdrop-filter:blur(2px);display:flex;align-items:flex-end;justify-content:center;animation:fade .25s}

@keyframes sheetin{from{opacity:.5;transform:translateY(100%)}to{opacity:1;transform:none}}
.modal-head{padding:22px 22px 12px;display:flex;align-items:center;gap:12px}
.modal-head h3{font-size:19px;font-weight:700;letter-spacing:-.02em;flex:1;text-align:left}

/* ---------- iOS bottom tab bar (mobile nav layer) ---------- */
.tabbar{display:none}

@media (max-width:900px){
  .tabbar{
    display:flex;position:fixed;left:0;right:0;bottom:0;z-index:35;
    justify-content:center;gap:2px;
    padding:8px 10px calc(8px + var(--safe-b));

  }
  .tabbar-inner{
    display:flex;gap:2px;background:rgba(248,248,250,.8);
    backdrop-filter:saturate(1.8) blur(22px);-webkit-backdrop-filter:saturate(1.8) blur(22px);

  }

  .tab .tab-badge{position:absolute;top:2px;right:calc(50% - 20px);background:var(--ios-red);color:#fff;font-size:9px;font-weight:700;min-width:15px;height:15px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 3px}

}

/* ---------- misc ---------- */
.divider{height:1px;background:var(--line-2);margin:20px 0}

/* iOS action-sheet rows */
.act-row{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:var(--fill-2);border:0;cursor:pointer;padding:15px 16px;border-radius:13px;font-size:16px;font-weight:550;color:var(--ink);transition:background .12s,transform .08s var(--ease)}

/* scrollbars */

/* ---------- Responsive ---------- */

<body>
<div id="app"></div>
<div id="toasts"></div>
<div id="modal-root"></div>

<!-- libraries loaded lazily on demand (export). app core works without them. -->
<script>
/* ============================================================
   ÜBERGABE — Wohnungsübergabeprotokoll
   Eigenständige App. Speicher: IndexedDB. KI: Anthropic API (BYO-Key).
   ============================================================ */
"use strict";

/* ===================== PURE (testbar) ===================== */
//#region PURE
const SEVERITY = {
  keine:     { key:"keine",     label:"Kein Mangel", rank:0, color:"#5E6F73", pdf:[94,111,115] },
  gering:    { key:"gering",    label:"Geringfügig", rank:1, color:"#C99A12", pdf:[201,154,18] },
  mittel:    { key:"mittel",    label:"Mittel",      rank:2, color:"#D9712B", pdf:[217,113,43] },
  erheblich: { key:"erheblich", label:"Erheblich",   rank:3, color:"#C7382F", pdf:[199,56,47] },
};
function severityMeta(k){ return SEVERITY[k] || SEVERITY.keine; }

const CATEGORIES = {
  zustand:  { key:"zustand",  label:"Zustand" },
  schaden:  { key:"schaden",  label:"Schaden" },
  maengel:  { key:"maengel",  label:"Mangel" },
  sonstiges:{ key:"sonstiges",label:"Sonstiges" },
};
function categoryMeta(k){ return CATEGORIES[k] || CATEGORIES.zustand; }

const METER_TYPES = {
  strom:      "Strom",
  strom_ht:   "Strom (HT)",
  strom_nt:   "Strom (NT)",
  gas:        "Gas",
  wasser_kalt:"Wasser (kalt)",
  wasser_warm:"Wasser (warm)",
  heizung:    "Heizung",
  fernwaerme: "Fernwärme",
};

function uid(p){ return (p||"id")+"_"+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4); }
function clamp(n,a,b){ return Math.max(a,Math.min(b,n)); }

function escapeHtml(s){
  return String(s==null?"":s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

/* Verkleinerung: längste Kante auf max, Seitenverhältnis erhalten */
function computeResize(w,h,max){
  w=Math.max(1,Math.round(w)); h=Math.max(1,Math.round(h));
  if(w<=max && h<=max) return {w,h,scaled:false};
  const r = w>h ? max/w : max/h;
  return { w:Math.max(1,Math.round(w*r)), h:Math.max(1,Math.round(h*r)), scaled:true };
}

function formatDate(iso,withTime){
  if(!iso) return "—";
  const d = (iso instanceof Date)?iso:new Date(iso);
  if(isNaN(d)) return "—";
  const p=n=>String(n).padStart(2,"0");
  const base = p(d.getDate())+"."+p(d.getMonth()+1)+"."+d.getFullYear();
  return withTime ? base+", "+p(d.getHours())+":"+p(d.getMinutes())+" Uhr" : base;
}
function dateInputValue(iso){
  const d = iso?new Date(iso):new Date();
  if(isNaN(d)) return "";
  const p=n=>String(n).padStart(2,"0");
  return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate());
}

const PROTOCOL_MODES = {
  einzug:{key:"einzug",label:"Einzug / Übernahme"},
  auszug:{key:"auszug",label:"Auszug / Rückgabe"},
  kauf:{key:"kauf",label:"Kaufübergabe"},
};
const PROTOCOL_TYPES = {
  miete:{key:"miete",label:"Mietwohnung"},
  kauf:{key:"kauf",label:"Kaufobjekt"},
  untermiete:{key:"untermiete",label:"Untermiete"},
  gewerbe:{key:"gewerbe",label:"Gewerbe"},
};

function newProtocol(){
  const now = new Date().toISOString();
  return {
    id: uid("prot"), schema:1, createdAt:now, updatedAt:now,
    type:"miete", mode:"einzug",
    object:{ strasse:"", plz:"", ort:"", etage:"", wohnungsnr:"", flaeche:"" },
    parties:{
      uebergeber:{ rolle:"Vermieter:in", name:"", anschrift:"", kontakt:"" },
      uebernehmer:{ rolle:"Mieter:in", name:"", anschrift:"", kontakt:"" },
      zeugen:[],
    },
    datum: now, ortUnterzeichnung:"",
    rooms:[], entries:[], meters:[], keys:[],
    floorplan:null,                       // {imageId,w,h} | {sketch:true, dataUrl, w, h}
    signatures:{ uebergeber:null, uebernehmer:null, datum:null },
    notes:"",
    agreements:"",
  };
}

/* Fortschritt / Vollständigkeit eines Protokolls (für UI-Badges) */
function protocolSummary(p){
  const o=p.object||{};
  const hasObject = !!(o.strasse && o.ort);
  const hasParties = !!(p.parties?.uebergeber?.name && p.parties?.uebernehmer?.name);
  const damages = (p.entries||[]).filter(e=>severityMeta(e.severity).rank>0).length;
  const signed = !!(p.signatures?.uebergeber && p.signatures?.uebernehmer);
  const steps = [hasObject,hasParties,(p.rooms||[]).length>0,(p.entries||[]).length>0,(p.meters||[]).length>0,signed];
  const doneCount = steps.filter(Boolean).length;
  return {
    hasObject, hasParties, signed,
    rooms:(p.rooms||[]).length, entries:(p.entries||[]).length,
    meters:(p.meters||[]).length, keys:(p.keys||[]).length,
    damages, progress: Math.round(doneCount/steps.length*100),
    title: o.strasse ? (o.strasse + (o.ort?(", "+o.ort):"")) : "Ohne Adresse",
  };
}

/* Validierung vor Export — liefert Warnungen (Rechtssicherheit) */
function validateProtocol(p){
  const w=[]; const o=p.object||{};
  if(!o.strasse || !o.ort) w.push("Objektadresse unvollständig (Straße/Ort).");
  if(!p.parties?.uebergeber?.name) w.push("Name der übergebenden Partei fehlt.");
  if(!p.parties?.uebernehmer?.name) w.push("Name der übernehmenden Partei fehlt.");
  if(!p.datum) w.push("Datum der Übergabe fehlt.");
  if(!(p.rooms||[]).length) w.push("Keine Räume erfasst.");
  if(!(p.entries||[]).length) w.push("Keine Foto-/Zustandsaufnahmen erfasst.");
  if(!(p.meters||[]).length) w.push("Keine Zählerstände erfasst.");
  if(!p.signatures?.uebergeber) w.push("Unterschrift der übergebenden Partei fehlt.");
  if(!p.signatures?.uebernehmer) w.push("Unterschrift der übernehmenden Partei fehlt.");
  (p.entries||[]).forEach((e,i)=>{
    if(!e.description || !e.description.trim()) w.push("Aufnahme #"+(i+1)+" ohne Beschreibung.");
  });
  return w;
}

/* Flacht ein Protokoll in eine geordnete Exportstruktur (Räume → Einträge) */
function buildExportModel(p){
  const roomsById = {}; (p.rooms||[]).forEach(r=>roomsById[r.id]=r);
  const groups = [];
  const order = (p.rooms||[]).map(r=>r.id).concat([null]); // null = nicht zugeordnet
  order.forEach(rid=>{
    const items = (p.entries||[]).filter(e=>(e.roomId||null)===rid);
    if(!items.length && rid!==null) { groups.push({ room:roomsById[rid], items:[] }); return; }
    if(!items.length) return;
    groups.push({ room: rid? roomsById[rid] : {id:null,name:"Nicht zugeordnet"}, items });
  });
  const damages = (p.entries||[]).filter(e=>severityMeta(e.severity).rank>0)
    .sort((a,b)=>severityMeta(b.severity).rank-severityMeta(a.severity).rank);
  return { groups, damages, summary:protocolSummary(p) };
}

/* ===================== DB (IndexedDB) ===================== */
//#region DB
const DB = (function(){
  const NAME="uebergabe_db", VERSION=1;
  let _db=null;
  function open(){
    return new Promise((res,rej)=>{
      if(_db) return res(_db);
      const req = indexedDB.open(NAME,VERSION);
      req.onupgradeneeded = e=>{
        const db = e.target.result;
        if(!db.objectStoreNames.contains("protocols")) db.createObjectStore("protocols",{keyPath:"id"});
        if(!db.objectStoreNames.contains("images")) db.createObjectStore("images",{keyPath:"id"});
        if(!db.objectStoreNames.contains("settings")) db.createObjectStore("settings",{keyPath:"key"});
      };
      req.onsuccess = e=>{ _db=e.target.result; res(_db); };
      req.onerror = e=>rej(e.target.error);
    });
  }
  function tx(store,mode){ return open().then(db=>db.transaction(store,mode).objectStore(store)); }
  function p(req){ return new Promise((res,rej)=>{ req.onsuccess=()=>res(req.result); req.onerror=()=>rej(req.error); }); }

  return {
    open,
    async put(store,val){ const s=await tx(store,"readwrite"); return p(s.put(val)); },
    async get(store,key){ const s=await tx(store,"readonly"); return p(s.get(key)); },
    async del(store,key){ const s=await tx(store,"readwrite"); return p(s.delete(key)); },
    async all(store){ const s=await tx(store,"readonly"); return p(s.getAll()); },
    async clear(store){ const s=await tx(store,"readwrite"); return p(s.clear()); },
    // settings helpers
    async getSetting(k,def){ const r=await this.get("settings",k); return r? r.value : def; },
    async setSetting(k,v){ return this.put("settings",{key:k,value:v}); },
    // image helpers
    async putImage(rec){ return this.put("images",rec); },
    async getImage(id){ return this.get("images",id); },
    async delImage(id){ return id? this.del("images",id) : null; },
  };
})();
//#endregion DB

/* ---- reine Hilfsfunktionen (testbar) ---- */
function damageById(id){ return DAMAGE_DB.find(d=>d.id===id) || null; }

function _norm(s){ return String(s||"").toLowerCase()
  .replace(/ä/g,"ae").replace(/ö/g,"oe").replace(/ü/g,"ue").replace(/ß/g,"ss"); }

function _roomMatch(entry, roomName){
  if(!roomName) return 0;
  const r=_norm(roomName);
  if((entry.rooms||[]).some(x=>x!=="*" && (r.includes(_norm(x))||_norm(x).includes(r)))) return 1;
  if((entry.rooms||[]).includes("*")) return 0.25;
  return 0;
}

/* Textklassifikation: rankt Katalogeinträge nach Stichwort-/Titel-Treffern */
function classifyText(text, roomName){
  const t=_norm(text);
  const out=[];
  for(const e of DAMAGE_DB){
    let s=0;
    if(t){
      for(const k of (e.keywords||[])){ if(t.includes(_norm(k))) s+=1; }
      if(t.includes(_norm(e.label))) s+=1.5;
    }
    s += _roomMatch(e,roomName)*0.4;
    if(s>0) out.push({ id:e.id, entry:e, score:s });
  }
  out.sort((a,b)=>b.score-a.score);
  return out;
}

/* Bildmerkmal-Bewertung: features = Ausgabe von analyzeImageHeuristics (oder null) */
function scoreImageFeatures(features, entry){
  if(!features || !features.ratios) return null;
  const f=entry.features||{};
  const R=features.ratios;
  // Farb-/Tonübereinstimmung
  let hue=0;
  if(f.hues && f.hues.length){
    for(const h of f.hues){ const v=R[h]||0; hue=Math.max(hue, Math.min(1, v/0.14)); }
  } else { hue=0.3; }
  // Musterübereinstimmung
  let pat=0.35;
  if(f.pattern && f.pattern!=="any"){
    if(features.pattern===f.pattern) pat=1;
    else if((f.pattern==="cluster"&&features.pattern==="diffuse")||(f.pattern==="diffuse"&&features.pattern==="cluster")) pat=0.6;
    else if((f.pattern==="spot"&&features.pattern==="cluster")||(f.pattern==="linear"&&features.pattern==="mixed")) pat=0.5;
    else pat=0.15;
  }
  // Lageübereinstimmung (nur boden/decke/wand verlässlich erkennbar)
  let loc=0.5;
  if(f.location==="boden"||f.location==="decke"||f.location==="wand"){
    if(features.location===f.location) loc=1;
    else if(features.location==="mixed") loc=0.5;
    else loc=0.2;
  }
  const raw=(0.55*hue + 0.30*pat + 0.15*loc) * (f.weight||1);
  return Math.max(0, Math.min(1, raw));
}

/* Lernen: reine Modell-Mathematik (Persistenz separat) */
function learnEmptyModel(){ return { v:1, total:0, id:{}, rc:{}, corr:{} }; }
function learnKey(roomName, id){ return _norm(roomName||"_")+"|"+id; }
function learnApply(model, info){
  const m = model && model.v ? model : learnEmptyModel();
  const id=info.damageId; if(!id) return m;
  m.total=(m.total||0)+1;
  m.id[id]=(m.id[id]||0)+1;
  const rk=learnKey(info.roomName,id);
  m.rc[rk]=(m.rc[rk]||0)+1;
  if(info.suggestedTopId && info.suggestedTopId!==id){
    m.corr[id]=(m.corr[id]||0)+1;       // dieser Befund wurde trotz anderer Empfehlung gewählt
  }
  return m;
}
function learnBias(model, id, roomName){
  if(!model || !model.total) return 0;
  const g=model.id[id]||0;
  const rc=model.rc[learnKey(roomName,id)]||0;
  let maxG=1; for(const k in model.id){ if(model.id[k]>maxG) maxG=model.id[k]; }
  const globalPart=(g/maxG)*0.18;
  const roomPart=Math.min(1, rc/3)*0.34;          // raumspezifisch stärker gewichtet
  const corrPart=Math.min(1,(model.corr[id]||0)/3)*0.06;
  return Math.min(0.55, globalPart+roomPart+corrPart);
}

/* Gesamt-Ranking: Basis (Raum) + Bild + Lernen */
function rankDamages(opts){
  opts=opts||{};
  const roomName=opts.roomName, features=opts.features, model=opts.learning, limit=opts.limit||6;
  const textRank=opts.text ? classifyText(opts.text, roomName) : null;
  const textMap={}; if(textRank){ const mx=textRank.length?textRank[0].score:1; textRank.forEach(r=>{ textMap[r.id]=Math.min(1, r.score/(mx||1)); }); }
  const res=[];
  for(const e of DAMAGE_DB){
    const base=_roomMatch(e, roomName)*0.18;
    const img=scoreImageFeatures(features, e);          // null wenn kein Bild
    const imgPart=(img==null?0:img)*0.6;
    const txtPart=(textMap[e.id]||0)*0.5;
    const learn=learnBias(model, e.id, roomName);
    const score=base+imgPart+txtPart+learn;
    res.push({ id:e.id, entry:e, score, parts:{ base, img:(img==null?null:img), txt:(textMap[e.id]||0), learn } });
  }
  res.sort((a,b)=>b.score-a.score);
  return res.slice(0, limit);
}

/* protokolltaugliche, NEUTRALE Beschreibung (ohne Schuldzuweisung) */
function buildDescription(entry, ctx){
  ctx=ctx||{};
  let t=entry.beschreibung||entry.label;
  const raum = ctx.roomName ? ctx.roomName : "dem betreffenden Raum";
  const matMap={ parkett:"Parkett", laminat:"Laminat", fliesen:"Fliesen", teppich:"Teppichboden", pvc:"PVC", dielen:"Dielen" };
  const mat = ctx.mat || "Bodenbelag";
  t=t.replace(/\{raum\}/g, raum)
     .replace(/\{mat\}/g, matMap[_norm(mat)]||mat)
     .replace(/\{pos\}/g, ctx.pos || "siehe Foto")
     .replace(/\{mass\}/g, ctx.mass || "Maß siehe Foto")
     .replace(/\{detail\}/g, ctx.detail || "siehe Foto");
  return t;
}

/* ===================== Bild-Verarbeitung ===================== */
function loadImageEl(src){
  return new Promise((res,rej)=>{ const im=new Image(); im.onload=()=>res(im); im.onerror=()=>rej(new Error("decode")); im.src=src; });
}
/* Dekodiert eine Datei/Blob zu etwas Zeichenbarem – robust für eingebettete Webviews.
   1) createImageBitmap (ohne URL, CSP-sicher)  2) FileReader→data:-URL  3) blob:-ObjectURL */
async function decodeImage(fileOrBlob){
  if(typeof createImageBitmap==="function"){
    try{ const bmp=await createImageBitmap(fileOrBlob);
      return { drawable:bmp, w:bmp.width, h:bmp.height, cleanup:()=>{ try{ bmp.close&&bmp.close(); }catch(_){}} }; }
    catch(_){}
  }
  try{ const dataUrl=await blobToDataURL(fileOrBlob); const img=await loadImageEl(dataUrl);
    return { drawable:img, w:img.naturalWidth||img.width, h:img.naturalHeight||img.height, cleanup:()=>{} }; }
  catch(_){}
  const url=URL.createObjectURL(fileOrBlob);
  try{ const img=await loadImageEl(url);
    return { drawable:img, w:img.naturalWidth||img.width, h:img.naturalHeight||img.height, cleanup:()=>{ try{URL.revokeObjectURL(url);}catch(_){}} }; }
  catch(e){ try{URL.revokeObjectURL(url);}catch(_){}; throw new Error("Bild konnte nicht geladen werden."); }
}
function canvasToBlob(canvas,type,q){
  return new Promise((res)=>{ canvas.toBlob(b=>res(b),type,q); });
}

/* komprimiert eine Datei → {blob,w,h} und erzeugt Thumbnail */
async function processImageFile(file, opts){
  opts=opts||{};
  const maxEdge = opts.maxEdge || App.settings.imgMaxEdge || 1600;
  const quality = opts.quality || App.settings.imgQuality || 0.82;
  const dec = await decodeImage(file);
  try{
    const dim = computeResize(dec.w, dec.h, maxEdge);
    const c=document.createElement("canvas"); c.width=dim.w; c.height=dim.h;
    const ctx=c.getContext("2d"); ctx.imageSmoothingQuality="high";
    ctx.drawImage(dec.drawable,0,0,dim.w,dim.h);
    const blob=await canvasToBlob(c,"image/jpeg",quality);
    // thumbnail
    const td=computeResize(dim.w,dim.h,360);
    const tc=document.createElement("canvas"); tc.width=td.w; tc.height=td.h;
    tc.getContext("2d").drawImage(c,0,0,td.w,td.h);
    const thumb=await canvasToBlob(tc,"image/jpeg",0.7);
    return { blob, thumb, w:dim.w, h:dim.h, bytes:blob.size };
  } finally { dec.cleanup(); }
}

/* speichert ein verarbeitetes Bild in DB, liefert imageId */

/* Blob → anzeigbare URL (data: bevorzugt, CSP-/Webview-sicher) */
async function imageUrl(id, useThumb){
  if(!id) return null;
  const rec=await DB.getImage(id);
  if(!rec) return null;
  const blob = (useThumb && rec.thumb) ? rec.thumb : rec.blob;
  try{ return await blobToDataURL(blob); }
  catch(_){ try{ return trackUrl(URL.createObjectURL(blob)); }catch(__){ return null; } }
}
async function blobToDataURL(blob){
  // Robust: arrayBuffer + Base64 (funktioniert in Webviews/Browsern zuverlässig); FileReader als Fallback.
  try{
    const buf=new Uint8Array(await blob.arrayBuffer());
    let bin=""; const CH=0x8000;
    for(let i=0;i<buf.length;i+=CH){ bin+=String.fromCharCode.apply(null, buf.subarray(i, i+CH)); }
    const b64=(typeof btoa!=="undefined") ? btoa(bin) : Buffer.from(buf).toString("base64");
    return "data:"+(blob.type||"image/jpeg")+";base64,"+b64;
  }catch(_){
    return await new Promise((res,rej)=>{ const fr=new FileReader(); fr.onload=()=>res(fr.result); fr.onerror=rej; fr.readAsDataURL(blob); });
  }
}

/* Bildanzeige über <canvas> – unabhängig von der img-src-CSP der Webview, funktioniert überall.
   opts: { thumb, maxW, cover:{w,h} } */
async function blobToCanvas(blob, opts){
  opts=opts||{};
  const dec=await decodeImage(blob);
  try{
    if(opts.cover){
      const W=opts.cover.w, H=opts.cover.h;
      const cv=document.createElement("canvas"); cv.width=W; cv.height=H;
      const ctx=cv.getContext("2d"); const s=Math.max(W/dec.w, H/dec.h);
      const dw=dec.w*s, dh=dec.h*s; ctx.drawImage(dec.drawable,(W-dw)/2,(H-dh)/2,dw,dh);
      return cv;
    }
    let w=dec.w, h=dec.h; const target=opts.maxW||0;
    if(target && w>target){ const s=target/w; w=Math.round(w*s); h=Math.round(h*s); }
    const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
    cv.getContext("2d").drawImage(dec.drawable,0,0,w,h);
    return cv;
  } finally { dec.cleanup(); }
}
async function imageCanvas(imageId, opts){
  opts=opts||{};
  try{
    const rec=await DB.getImage(imageId); if(!rec) return null;
    const order = opts.thumb ? [rec.thumb, rec.blob] : [rec.blob, rec.thumb];
    for(const b of order){ if(!b) continue; try{ const cv=await blobToCanvas(b, opts); if(cv) return cv; }catch(_){} }
    return null;
  }catch(_){ return null; }
}
async function dataUrlToCanvas(dataUrl, opts){
  try{ const blob=await (await fetch(dataUrl)).blob(); return await blobToCanvas(blob, opts); }
  catch(_){ return null; }
}
/* Grundriss-Medium: Vektor-SVG (bevorzugt, CSP-sicher) · Foto-Canvas · Platzhalter */
async function floorplanMedia(p, opts){
  if(!p.floorplan) return null;
  if(p.floorplan.svg){ const s=el(p.floorplan.svg); if(s){ s.dataset.plan="1"; return s; } }
  let cv=null;
  if(p.floorplan.imageId) cv=await imageCanvas(p.floorplan.imageId, opts);
  if(!cv && p.floorplan.dataUrl) cv=await dataUrlToCanvas(p.floorplan.dataUrl, opts);
  if(cv){ cv.dataset.plan="1"; return cv; }
  const src = p.floorplan.dataUrl || (p.floorplan.imageId ? await imageUrl(p.floorplan.imageId) : null);
  if(src){ const im=el('<img alt="" draggable="false">'); im.src=src; im.dataset.plan="1"; return im; }

   Läuft vollständig lokal im Browser – kein Server, kein API-Schlüssel.
   1) Bildheuristik liest Farb-/Ton-/Muster-/Lage-Merkmale aus dem Foto.
   2) Abgleich mit der recherchegestützten Wissensdatenbank (DAMAGE_DB).
   3) On-Device-Lernen gewichtet die Vorschläge nach bisherigen Bestätigungen.
   Die Vorschläge sind eine Hilfestellung und ersetzen keine fachliche/rechtliche Prüfung. */

/* Bildheuristik: liefert Merkmalsobjekt (oder null), browser-only */
async function analyzeImageHeuristics(imageId){
  try{
    const rec = await DB.getImage(imageId); if(!rec) return null;
    const dec = await decodeImage(rec.blob);
    try{
      const W=dec.w, H=dec.h;
      if(!W||!H) return null;
      const scale=Math.min(1, 100/Math.max(W,H));
      const w=Math.max(8,Math.round(W*scale)), h=Math.max(8,Math.round(H*scale));
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      const cx=cv.getContext("2d"); cx.drawImage(dec.drawable,0,0,w,h);
      const data=cx.getImageData(0,0,w,h).data;
      const N=w*h;
      const cnt={ dark:0,white:0,yellow:0,brown:0,green:0,gray:0,rust:0 };
      let sumL=0,sumS=0;
      const lum=new Float32Array(N);
      const anom=new Uint8Array(N);
      let ax=0,ay=0,an=0,minx=w,maxx=0,miny=h,maxy=0;
      for(let i=0,p=0;i<N;i++,p+=4){
        const r=data[p],g=data[p+1],b=data[p+2];
        const mx=Math.max(r,g,b),mn=Math.min(r,g,b);
        const l=(0.299*r+0.587*g+0.114*b); lum[i]=l; sumL+=l;
        const d=mx-mn; const sat=mx===0?0:d/mx; sumS+=sat;
        // Farbton (Grad)
        let hue=0;
        if(d!==0){
          if(mx===r) hue=((g-b)/d)%6;
          else if(mx===g) hue=(b-r)/d+2;
          else hue=(r-g)/d+4;
          hue*=60; if(hue<0)hue+=360;
        }
        let isAnom=false;
        if(l<58 && sat<0.45){ cnt.dark++; isAnom=true; }
        else if(l>198 && sat<0.16){ cnt.white++; }
        else if(sat<0.16){ cnt.gray++; }
        else if(hue>=70 && hue<=175){ cnt.green++; isAnom=true; }
        else if(hue>=40 && hue<70){ cnt.yellow++; isAnom=true; }
        else if(hue>=12 && hue<40 && l<175){ cnt.brown++; isAnom=true; }
        else if(hue<12 || hue>=345){ cnt.rust++; if(sat>0.3){ isAnom=true; } }
        else { cnt.gray++; }
        if(isAnom){ const X=i%w, Y=(i/w)|0; anom[i]=1; an++; ax+=X; ay+=Y;
          if(X<minx)minx=X; if(X>maxx)maxx=X; if(Y<miny)miny=Y; if(Y>maxy)maxy=Y; }
      }
      // Kantendichte (Sobel-ähnlich auf Luminanz)
      let edges=0;
      for(let y=1;y<h-1;y++){ for(let x=1;x<w-1;x++){
        const i=y*w+x;
        const gx=lum[i-1]-lum[i+1];
        const gy=lum[i-w]-lum[i+w];
        if(Math.sqrt(gx*gx+gy*gy)>42) edges++;
      }}
      const ratios={}; for(const k in cnt) ratios[k]=cnt[k]/N;
      const edgeDensity=edges/N;
      const anomFrac=an/N;
      // Muster
      let pattern="cluster";
      const bbW=Math.max(1,maxx-minx+1), bbH=Math.max(1,maxy-miny+1);
      const bbArea=(bbW*bbH)/N;
      const fill = an/(bbW*bbH);            // Dichte innerhalb der Bounding-Box
      const elong=Math.max(bbW,bbH)/Math.min(bbW,bbH);
      if(anomFrac<0.03) pattern="spot";
      else if(edgeDensity>0.16 && elong>2.4 && fill<0.5) pattern="linear";
      else if(anomFrac>0.24 || bbArea>0.55) pattern="diffuse";
      else pattern="cluster";
      // Lage (Schwerpunkt der Auffälligkeiten)
      let location="mixed";
      if(an>0){
        const cyR=(ay/an)/h;
        if(anomFrac>=0.02){ location = cyR<0.34 ? "decke" : (cyR>0.66 ? "boden" : "wand"); }
      }
      return { brightness:(sumL/N)/255, saturation:sumS/N, ratios, pattern, location, edgeDensity, anomaly:anomFrac };
    } finally { dec.cleanup(); }
  }catch(_){ return null; }
}

function _whyText(entry, features){
  if(!features) return "Vorschlag nach Raum/Text und Lernverlauf.";
  const f=entry.features||{}; const R=features.ratios||{};
  const hueNames={dark:"dunkle",green:"grünlich-dunkle",yellow:"gelbliche",brown:"bräunliche",white:"helle/kalkartige",gray:"graue",rust:"rötliche"};
  let topHue=null,topVal=0;
  (f.hues||[]).forEach(h=>{ if((R[h]||0)>topVal){ topVal=R[h]||0; topHue=h; } });
  const patNames={linear:"linienförmige",cluster:"geclusterte",diffuse:"flächige",spot:"punktuelle"};
  const locNames={boden:"im unteren Bildbereich",decke:"im oberen Bildbereich",wand:"in der Bildmitte",mixed:"über das Bild verteilt"};
  const bits=[];
  if(topHue && topVal>0.02) bits.push((hueNames[topHue]||topHue)+" Anteile");
  if(features.pattern) bits.push((patNames[features.pattern]||features.pattern)+" Struktur");
  if(features.location && features.location!=="mixed") bits.push(locNames[features.location]);
  return bits.length? ("Erkannt: "+bits.join(", ")+".") : "Anhaltspunkte aus Bild, Raum und Lernverlauf.";
}

/* ===================== Unterschriften-Pad ===================== */
function SignaturePad(canvas){
  const ctx=canvas.getContext("2d");
  let drawing=false,last=null,dirty=false;
  function resize(){
    const ratio=window.devicePixelRatio||1;
    const rect=canvas.getBoundingClientRect();
    canvas.width=rect.width*ratio; canvas.height=rect.height*ratio;
    ctx.scale(ratio,ratio);
    ctx.lineWidth=2.4; ctx.lineCap="round"; ctx.lineJoin="round"; ctx.strokeStyle="#13191B";
  }
  function pos(e){
    const r=canvas.getBoundingClientRect();
    const t=e.touches?e.touches[0]:e;
    return { x:t.clientX-r.left, y:t.clientY-r.top };
  }
  function start(e){ e.preventDefault(); drawing=true; last=pos(e); }
  function move(e){ if(!drawing)return; e.preventDefault(); const p=pos(e); ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke(); last=p; dirty=true; }
  function end(){ drawing=false; }
  canvas.addEventListener("mousedown",start); canvas.addEventListener("mousemove",move); window.addEventListener("mouseup",end);
  canvas.addEventListener("touchstart",start,{passive:false}); canvas.addEventListener("touchmove",move,{passive:false}); canvas.addEventListener("touchend",end);
  resize();
  return {
    clear(){ ctx.clearRect(0,0,canvas.width,canvas.height); dirty=false; },
    isEmpty(){ return !dirty; },
    toDataURL(){ return dirty?canvas.toDataURL("image/png"):null; },
    load(dataUrl){ if(!dataUrl)return; const img=new Image(); img.onload=()=>{ const r=canvas.getBoundingClientRect(); ctx.drawImage(img,0,0,r.width,r.height); dirty=true; }; img.src=dataUrl; },
    destroy(){ window.removeEventListener("mouseup",end); }
  };
}


/* ===================== DOM-Helfer ===================== */
function el(html){ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstElementChild; }
function qs(s,r){ return (r||document).querySelector(s); }
function qsa(s,r){ return Array.from((r||document).querySelectorAll(s)); }
function on(node,ev,sel,fn){
  if(typeof sel==="function"){ node.addEventListener(ev,sel); return; }
  node.addEventListener(ev,e=>{ const t=e.target.closest(sel); if(t && node.contains(t)) fn(e,t); });
}

async function duplicateProtocol(p){
  const copy=JSON.parse(JSON.stringify(p));
  copy.id=uid("prot"); copy.createdAt=copy.updatedAt=new Date().toISOString();
  copy.signatures={uebergeber:null,uebernehmer:null,datum:null};
  // Bilder duplizieren
  const remap={};
  async function dupImg(id){ if(!id)return null; if(remap[id])return remap[id]; const rec=await DB.getImage(id); if(!rec)return null; const nid=uid("img"); await DB.putImage(Object.assign({},rec,{id:nid,createdAt:new Date().toISOString()})); remap[id]=nid; return nid; }
  for(const e of copy.entries){ e.imageId=await dupImg(e.imageId); }
  for(const m of copy.meters){ m.imageId=await dupImg(m.imageId); }
  if(copy.floorplan&&copy.floorplan.imageId) copy.floorplan.imageId=await dupImg(copy.floorplan.imageId);
  await DB.put("protocols",copy);
  toast("Protokoll dupliziert","ok");
  renderShell();
}

async function deleteProtocolFlow(p){
  const ok=await confirmDialog("Protokoll löschen?","Das Protokoll und alle zugehörigen Fotos werden unwiderruflich gelöscht.","Endgültig löschen",true);
  if(!ok) return;
  for(const e of (p.entries||[])) await DB.delImage(e.imageId);
  for(const m of (p.meters||[])) await DB.delImage(m.imageId);
  if(p.floorplan&&p.floorplan.imageId) await DB.delImage(p.floorplan.imageId);
  await DB.del("protocols",p.id);
  toast("Protokoll gelöscht");
  if(App.protocol && App.protocol.id===p.id){ App.protocol=null; go("dashboard"); }
  else renderShell();
}


/* ===================== Formular-Bindung ===================== */
function getPath(obj,path){ return path.split(".").reduce((o,k)=>o==null?o:o[k],obj); }
function setPath(obj,path,val){ const ks=path.split("."); const last=ks.pop(); const t=ks.reduce((o,k)=>(o[k]=o[k]||{}),obj); t[last]=val; }

function boundField(opts){
  // opts: {label, path, type, placeholder, hint, options, rows}
  const id="f_"+opts.path.replace(/\./g,"_");
  const val=getPath(App.protocol,opts.path);
  const f=el('<div class="field"></div>');
  if(opts.label) f.appendChild(el('<label for="'+id+'">'+escapeHtml(opts.label)+'</label>'));
  if(opts.hint) f.appendChild(el('<div class="hint">'+escapeHtml(opts.hint)+'</div>'));
  let input;
  if(opts.type==="textarea"){
    input=el('<textarea class="inp" id="'+id+'" rows="'+(opts.rows||3)+'" placeholder="'+escapeHtml(opts.placeholder||"")+'"></textarea>');
    input.value=val||"";
  } else if(opts.type==="select"){
    input=el('<select class="inp" id="'+id+'"></select>');
    opts.options.forEach(o=>{ const op=el('<option value="'+escapeHtml(o.value)+'">'+escapeHtml(o.label)+'</option>'); if(String(o.value)===String(val))op.selected=true; input.appendChild(op); });
  } else if(opts.type==="date"){
    input=el('<input class="inp" type="date" id="'+id+'">'); input.value=dateInputValue(val);
  } else {
    input=el('<input class="inp" type="'+(opts.type||"text")+'" id="'+id+'" placeholder="'+escapeHtml(opts.placeholder||"")+'" autocomplete="off">');
    input.value=val||"";
  }
  input.addEventListener("input",()=>{
    let v=input.value;
    if(opts.type==="date" && v) v=new Date(v+"T12:00:00").toISOString();
    setPath(App.protocol,opts.path,v);
    scheduleSave();
    if(opts.onChange) opts.onChange(v);
  });
  f.appendChild(input);
  return f;
}

function addRoomFlow(room,idx){
  const editing=!!room;
  const body=el('<div><div class="field"><label>Raumbezeichnung</label><input class="inp" id="rn" placeholder="z. B. Wohnzimmer" autocomplete="off"></div></div>');
  qs("#rn",body).value=editing?room.name:"";
  const foot=el('<div></div>');
  const cancel=el('<button class="btn btn-ghost">Abbrechen</button>'); cancel.onclick=closeModal;
  const save=el('<button class="btn btn-pri">'+(editing?"Speichern":"Hinzufügen")+'</button>');
  const commit=()=>{ const n=qs("#rn",body).value.trim(); if(!n){toast("Bitte Bezeichnung eingeben","err");return;} if(editing){App.protocol.rooms[idx].name=n;}else{App.protocol.rooms.push({id:uid("room"),name:n});} scheduleSave(); closeModal(); viewRaeume(qs("#view")); };
  save.onclick=commit;
  qs("#rn",body).addEventListener("keydown",e=>{ if(e.key==="Enter")commit(); });
  foot.append(cancel,save);
  openModal({title:editing?"Raum bearbeiten":"Raum hinzufügen",body,footer:foot});
  setTimeout(()=>qs("#rn",body).focus(),60);
}


/* ---- Raumvorschläge (z. B. nach Grundriss-Import) ---- */
const ROOM_PALETTE=["Flur/Diele","Wohnzimmer","Esszimmer","Küche","Schlafzimmer","Kinderzimmer","Arbeitszimmer","Bad","Gäste-WC","Abstellraum","Hauswirtschaftsraum","Balkon","Terrasse","Keller","Dachboden","Garage"];
const ROOM_TYPE_DEFAULTS={
  "1-Zimmer":["Flur/Diele","Küche","Bad","Wohnzimmer"],
  "2-Zimmer":["Flur/Diele","Küche","Bad","Wohnzimmer","Schlafzimmer"],
  "3-Zimmer":["Flur/Diele","Küche","Bad","Wohnzimmer","Schlafzimmer","Kinderzimmer"],
  "4-Zimmer":["Flur/Diele","Küche","Bad","Gäste-WC","Wohnzimmer","Schlafzimmer","Kinderzimmer","Arbeitszimmer"],
  "Haus":["Flur/Diele","Küche","Bad","Gäste-WC","Wohnzimmer","Esszimmer","Schlafzimmer","Kinderzimmer","Arbeitszimmer","Keller"]
};
function suggestRoomsFlow(auto){
  const p=App.protocol;
  const existing=new Set(p.rooms.map(r=>_norm(r.name)));
  const sel=new Set();
  // sinnvolle Vorbelegung
  (ROOM_TYPE_DEFAULTS["3-Zimmer"]).forEach(n=>{ if(!existing.has(_norm(n))) sel.add(n); });
  const body=el('<div></div>');
  body.innerHTML='<p style="margin:0 0 14px;color:var(--ink-3);font-size:13.5px">'+(auto?'Grundriss gespeichert. ':'')+'Wähle eine Wohnungsgröße als Ausgangspunkt und passe die vorgeschlagenen Räume an. Bereits angelegte Räume sind ausgegraut.</p>';
  const typeWrap=el('<div style="margin-bottom:14px"><div class="lbl" style="margin-bottom:8px">Vorlage</div><div style="display:flex;flex-wrap:wrap;gap:8px" id="rt"></div></div>');
  const chipWrap=el('<div><div class="lbl" style="margin-bottom:8px">Räume</div><div style="display:flex;flex-wrap:wrap;gap:8px" id="rc"></div></div>');
  body.append(typeWrap,chipWrap);
  const renderChips=()=>{
    const cont=qs("#rc",chipWrap); cont.innerHTML="";
    ROOM_PALETTE.forEach(name=>{
      const has=existing.has(_norm(name));
      const on=sel.has(name);
      const b=el('<button class="chip-toggle'+(on?' on':'')+(has?' done':'')+'" '+(has?'disabled':'')+'>'+(has?'✓ ':'')+escapeHtml(name)+'</button>');
      if(!has) b.onclick=()=>{ if(sel.has(name))sel.delete(name); else sel.add(name); renderChips(); updateCount(); };
      cont.appendChild(b);
    });
  };
  const renderTypes=()=>{
    const cont=qs("#rt",typeWrap); cont.innerHTML="";
    Object.keys(ROOM_TYPE_DEFAULTS).forEach(t=>{
      const b=el('<button class="btn btn-sm btn-sec">'+escapeHtml(t)+'</button>');
      b.onclick=()=>{ sel.clear(); ROOM_TYPE_DEFAULTS[t].forEach(n=>{ if(!existing.has(_norm(n))) sel.add(n); }); renderChips(); updateCount(); };
      cont.appendChild(b);
    });
  };
  const foot=el('<div></div>');
  const cancel=el('<button class="btn btn-ghost">'+(auto?'Später':'Abbrechen')+'</button>'); cancel.onclick=closeModal;
  const ok=el('<button class="btn btn-pri">Räume übernehmen</button>');
  const updateCount=()=>{ ok.innerHTML=IC.check+'Räume übernehmen ('+sel.size+')'; ok.disabled=sel.size===0; };
  ok.onclick=()=>{ let added=0; ROOM_PALETTE.forEach(name=>{ if(sel.has(name)&&!existing.has(_norm(name))){ p.rooms.push({id:uid("room"),name}); added++; } }); scheduleSave(); closeModal(); toast(added+" Räume angelegt","ok"); if(App.view==="raeume")viewRaeume(qs("#view")); };
  foot.append(cancel,ok);
  renderTypes(); renderChips(); updateCount();
  openModal({title:"Räume vorschlagen",body,footer:foot,size:"lg"});
}

/* ---- Grundriss lesen: Legende (Recherche) ---- */
const FLOORPLAN_LEGEND=[
  ["Wände","Dicke, parallele Linien. Schwarz gefüllt oder schraffiert = meist tragende Wand (nicht veränderbar)."],
  ["Türen","Öffnung in der Wand mit Viertelkreis-Bogen – der Bogen zeigt die Schwenkrichtung des Türblatts."],
  ["Fenster","Doppellinie innerhalb der (Außen-)Wand. Gestrichelt = Oberlicht/hohes Fenster."],
  ["Balkon-/Terrassentür","Bodentiefes Fenster, erkennbar an Viertelkreis oder Diagonale wie bei einer Tür."],
  ["Maßstab","Meist 1:100 – 1 cm auf dem Plan = 1 m real. Maßketten am Rand geben Längen an."],
  ["Nordpfeil","Zeigt die Ausrichtung. Wichtig für Himmelsrichtung/Lichteinfall der Räume."],
  ["Raumkürzel","K = Küche, B = Bad, WC, Wfl = Wohnfläche, AR = Abstellraum, HWR = Hauswirtschaftsraum."],
  ["Sanitär/Küche","Feste Symbole für WC, Wanne, Dusche, Waschbecken und Küchenzeile zeigen die Einbauten."]
];

/* ---- Vektor-Grundriss (SVG) aus Räumen rekonstruieren ----
   Rendert nativ als Inline-SVG (unabhängig von Bild-CSP der Webview),
   ist gestochen scharf im Export und dient als Karte für die Pin-Verortung. */
function roomWeight(name){
  const n=_norm(name||"");
  if(/wohn/.test(n)) return 2.4;
  if(/ess/.test(n)) return 1.5;
  if(/kuche|küche|kueche/.test(n)) return 1.5;
  if(/schlaf/.test(n)) return 1.8;
  if(/kinder/.test(n)) return 1.5;
  if(/arbeit|buro|büro|buero/.test(n)) return 1.3;
  if(/\bwc\b/.test(n) && !/dusch|bad/.test(n)) return 0.7;
  if(/bad/.test(n)) return 1.1;
  if(/flur|diele/.test(n)) return 1.0;
  if(/balkon|terrasse|loggia/.test(n)) return 0.9;
  if(/keller|dach|abstell|hwr|hauswirtschaft|garage|speicher/.test(n)) return 0.9;
  return 1.2;
}
function buildSchematicSVG(rooms){
  const list=(rooms||[]).map(r=>r&&r.name).filter(Boolean);
  const items=(list.length?list:["Wohnung"]).map(nm=>({name:nm,w:roomWeight(nm)}));
  const n=items.length;
  const W=1000, P=24, G=8;
  let R=Math.max(1,Math.round(Math.sqrt(n/1.5))); R=Math.min(R,n);
  const perRow=Math.ceil(n/R);
  const grid=[]; for(let i=0;i<n;i+=perRow) grid.push(items.slice(i,i+perRow));
  const rowsN=grid.length;
  const innerW=W-2*P;
  const rowAvg=grid.map(row=>row.reduce((s,i)=>s+i.w,0)/row.length);
  const sumAvg=rowAvg.reduce((a,b)=>a+b,0)||1;
  const targetInnerH=W*0.70-2*P-(rowsN-1)*G;
  const rowH=rowAvg.map(a=>Math.max(78,targetInnerH*a/sumAvg));
  const innerH=rowH.reduce((a,b)=>a+b,0)+(rowsN-1)*G;
  const H=Math.round(innerH+2*P);
  let s='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" font-family="-apple-system,system-ui,sans-serif">';
  s+='<rect x="0" y="0" width="'+W+'" height="'+H+'" fill="#FFFFFF"/>';
  s+='<rect x="'+(P/2)+'" y="'+(P/2)+'" width="'+(W-P)+'" height="'+(H-P)+'" rx="6" fill="none" stroke="#1C1C1E" stroke-width="6"/>';
  let y=P;
  grid.forEach((row,ri)=>{
    const wsum=row.reduce((a,i)=>a+i.w,0)||1; let x=P; const h=rowH[ri];
    row.forEach((it,ci)=>{
      const w=innerW*it.w/wsum; const rw=w-(ci<row.length-1?G:0);
      s+='<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+rw.toFixed(1)+'" height="'+h.toFixed(1)+'" rx="3" fill="#EEF2F3" stroke="#3A3A3C" stroke-width="2.5"/>';
      const cx=x+rw/2, cy=y+h/2;
      const fs=Math.max(13,Math.min(23,rw/Math.max(7,it.name.length)*1.7));
      s+='<text x="'+cx.toFixed(1)+'" y="'+cy.toFixed(1)+'" text-anchor="middle" dominant-baseline="central" font-size="'+fs.toFixed(0)+'" font-weight="600" fill="#1C1C1E">'+escapeHtml(it.name)+'</text>';
      x+=w;
    });
    y+=h+G;
  });
  s+='<g transform="translate('+(P+10)+','+(P+18)+')" fill="#9C9CA1"><text font-size="13" font-weight="600">N ↑</text></g>';
  s+='<text x="'+(W-P-8)+'" y="'+(H-P-2)+'" text-anchor="end" font-size="13" fill="#9C9CA1">schematisch · nicht maßstabsgetreu</text>';
  s+='</svg>';
  return { svg:s, w:W, h:H };
}
function generateSchematicFlow(){
  const p=App.protocol;
  if(!p.rooms || !p.rooms.length){ toast("Lege zuerst Räume an – ich öffne die Vorschläge."); suggestRoomsFlow(false); return; }
  const r=buildSchematicSVG(p.rooms);
  if(p.floorplan && p.floorplan.imageId) DB.delImage(p.floorplan.imageId);
  p.floorplan={ svg:r.svg, w:r.w, h:r.h, kind:"schematic" };
  scheduleSave(); viewGrundriss(qs("#view")); toast("Vektor-Grundriss aus Räumen erstellt","ok");
}

      const setb=el('<button class="btn btn-ghost btn-sm">'+IC.pin+(e.pin?'Verschieben':'Setzen')+'</button>');
      setb.onclick=()=>placePinModal(e);
      item.appendChild(setb);
      legend.appendChild(item);
    });
  }
  c.appendChild(legend);

function pickFloorplanFile(replace){
  const inp=el('<input type="file" accept="image/*" class="hidden">');
  document.body.appendChild(inp);
  inp.onchange=async ()=>{
    const file=inp.files[0]; inp.remove(); if(!file)return;
    try{
      toast("Grundriss wird verarbeitet …");
      const p=App.protocol;
      if(replace && p.floorplan && p.floorplan.imageId) await DB.delImage(p.floorplan.imageId);
      const r=await storeImage(file,{maxEdge:1600,quality:0.85});
      p.floorplan={ imageId:r.id, w:r.w, h:r.h };
      await saveNow(); viewGrundriss(qs("#view")); toast("Grundriss gespeichert","ok");
      if(!replace && p.rooms.length===0) setTimeout(()=>suggestRoomsFlow(true),260);
    }catch(err){ console.error(err); toast("Fehler: "+err.message,"err"); }
  };
  inp.click();
}

/* ---- Pin-Setzen ---- */
async function placePinModal(entry){
  const p=App.protocol;
  if(!p.floorplan){ toast("Bitte zuerst einen Grundriss anlegen.","err"); go("grundriss"); return; }
  const num=p.entries.indexOf(entry)+1;
  const sev=severityMeta(entry.severity);
  const body=el('<div></div>');
  body.innerHTML='<div style="display:flex;align-items:center;gap:10px;margin:0 0 10px"><span style="flex:0 0 auto;width:26px;height:26px;border-radius:50%;background:'+sev.color+';color:#fff;display:grid;place-items:center;font-family:var(--f-mono);font-size:12px;font-weight:600">'+num+'</span><div style="min-width:0"><div style="font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escapeHtml(entry.title||"Aufnahme "+num)+'</div><div style="font-size:12px;color:var(--ink-3)">Tippe auf die Stelle im Plan – Pin lässt sich durch erneutes Tippen verschieben.</div></div></div>';
  const scroller=el('<div style="position:relative;background:var(--paper-2);border:1px solid var(--line);border-radius:10px;overflow:auto;max-height:56vh;min-height:200px;-webkit-overflow-scrolling:touch"></div>');
  const stage=el('<div style="position:relative;min-height:200px;display:flex;align-items:center;justify-content:center;cursor:crosshair"></div>');
  const fig=el('<div style="position:relative;line-height:0"></div>');
  const media=await floorplanMedia(p,{maxW:1600});
  const isPlan = !!(media.dataset && media.dataset.plan==="1");
  const isSvg = media.tagName && media.tagName.toLowerCase()==="svg";
  let zoom=1;
  const applyZoom=()=>{ if(!isPlan) return; const w=isSvg?(zoom===1?"100%":"200%"):(zoom===1?"auto":"200%"); media.style.cssText="display:block;height:auto;user-select:none;width:"+w+";max-width:"+(zoom===1?"100%":"none")+";max-height:"+(zoom===1?"54vh":"none"); };
  applyZoom();
  let cur = entry.pin ? {x:entry.pin.x,y:entry.pin.y} : null;
  const marker=el('<div style="position:absolute;width:30px;height:30px;transform:translate(-50%,-100%);pointer-events:none;z-index:2;'+((cur&&isPlan)?'':'display:none')+'"></div>');
  marker.innerHTML='<div style="width:28px;height:28px;background:var(--brand);border:2px solid #fff;border-radius:50% 50% 50% 0;rotate:-45deg;box-shadow:var(--sh-pin)"></div>';
  const status=el('<div class="hint" style="margin-top:8px">'+(!isPlan?'Plan-Vorschau hier nicht verfügbar – Position kann im gespeicherten Protokoll nicht gesetzt werden.':(cur?'Position gesetzt – mit „Speichern" bestätigen.':'Noch keine Position gewählt.'))+'</div>');
  function place(clientX,clientY){
    if(!isPlan) return;
    const r=media.getBoundingClientRect(); if(!r.width||!r.height) return;
    const x=clamp((clientX-r.left)/r.width,0,1), y=clamp((clientY-r.top)/r.height,0,1);
    cur={x,y}; marker.style.display="block"; marker.style.left=(x*100)+"%"; marker.style.top=(y*100)+"%";
    status.textContent='Position gesetzt – mit „Speichern" bestätigen.';
  }
  fig.append(media,marker);
  let moved=false;
  if(isPlan){
    fig.addEventListener("click",e=>place(e.clientX,e.clientY));
    fig.addEventListener("touchstart",()=>{ moved=false; },{passive:true});
    fig.addEventListener("touchmove",()=>{ moved=true; },{passive:true});
    fig.addEventListener("touchend",e=>{ if(moved)return; const t=(e.changedTouches&&e.changedTouches[0]); if(t)place(t.clientX,t.clientY); },{passive:true});
  }
  stage.appendChild(fig); scroller.appendChild(stage); body.appendChild(scroller);
  if(isPlan){

/* ---- Skizzen-Werkzeug ---- */
function openSketcher(){
  const W=1100,H=760;
  const ops=[]; let tool="pen", drawing=false, start=null, preview=null;
  const body=el('<div></div>');
  body.innerHTML=
    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px" id="sk-tools">'+
      '<div class="seg"><button data-t="pen" class="on">Stift</button><button data-t="rect">Wand / Raum</button><button data-t="label">Beschriftung</button></div>'+
      '<button class="btn btn-sec btn-sm" id="sk-undo">Rückgängig</button>'+
      '<button class="btn btn-sec btn-sm" id="sk-clear">Leeren</button>'+
    '</div>';
  const cvWrap=el('<div style="border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff"></div>');
  const cv=el('<canvas width="'+W+'" height="'+H+'" style="width:100%;display:block;touch-action:none;cursor:crosshair"></canvas>');
  cvWrap.appendChild(cv); body.appendChild(cvWrap);
  const ctx=cv.getContext("2d");

  function grid(){
    ctx.clearRect(0,0,W,H); ctx.fillStyle="#fff"; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle="#EAF0F0"; ctx.lineWidth=1;
    for(let x=0;x<=W;x+=40){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
    for(let y=0;y<=H;y+=40){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }
  }
  function drawOp(o){
    if(o.type==="path"){ ctx.strokeStyle="#13191B";ctx.lineWidth=3;ctx.lineCap="round";ctx.lineJoin="round";ctx.beginPath(); o.pts.forEach((pt,i)=>i?ctx.lineTo(pt.x,pt.y):ctx.moveTo(pt.x,pt.y)); ctx.stroke(); }
    else if(o.type==="rect"){ ctx.strokeStyle="#0F3D45";ctx.lineWidth=3.5;ctx.strokeRect(o.x,o.y,o.w,o.h); }
    else if(o.type==="text"){ ctx.fillStyle="#13191B";ctx.font="600 22px Inter, sans-serif";ctx.textBaseline="middle";ctx.fillText(o.text,o.x,o.y); }
  }
  function redraw(){ grid(); ops.forEach(drawOp); if(preview)drawOp(preview); }
  grid();

  function P(e){ const r=cv.getBoundingClientRect(); const t=e.touches?e.touches[0]:e; return { x:(t.clientX-r.left)/r.width*W, y:(t.clientY-r.top)/r.height*H }; }
  function down(e){ e.preventDefault(); const pt=P(e);
    if(tool==="label"){ const txt=prompt("Beschriftung (z. B. Raumname):"); if(txt){ ops.push({type:"text",x:pt.x,y:pt.y,text:txt}); redraw(); } return; }
    drawing=true; start=pt; preview = tool==="pen"?{type:"path",pts:[pt]}:{type:"rect",x:pt.x,y:pt.y,w:0,h:0};
  }
  function move(e){ if(!drawing)return; e.preventDefault(); const pt=P(e);
    if(tool==="pen"){ preview.pts.push(pt); } else { preview.x=Math.min(start.x,pt.x);preview.y=Math.min(start.y,pt.y);preview.w=Math.abs(pt.x-start.x);preview.h=Math.abs(pt.y-start.y); }
    redraw();
  }
  function up(){ if(!drawing)return; drawing=false; if(preview){ if(preview.type==="rect"&&(preview.w<4||preview.h<4)){} else if(preview.type==="path"&&preview.pts.length<2){} else ops.push(preview); } preview=null; redraw(); }
  cv.addEventListener("mousedown",down);cv.addEventListener("mousemove",move);window.addEventListener("mouseup",up);
  cv.addEventListener("touchstart",down,{passive:false});cv.addEventListener("touchmove",move,{passive:false});cv.addEventListener("touchend",up);

  on(body,"click","#sk-tools .seg button",(e,t)=>{ qsa("#sk-tools .seg button",body).forEach(b=>b.classList.remove("on")); t.classList.add("on"); tool=t.dataset.t; });
  qs("#sk-undo",body).onclick=()=>{ ops.pop(); redraw(); };
  qs("#sk-clear",body).onclick=()=>{ ops.length=0; redraw(); };

  const foot=el('<div></div>');
  const cancel=el('<button class="btn btn-ghost">Abbrechen</button>'); cancel.onclick=()=>{ window.removeEventListener("mouseup",up); closeModal(); };
  const save=el('<button class="btn btn-pri">'+IC.check+'Als Grundriss übernehmen</button>');
  save.onclick=async ()=>{
    redraw();
    const blob=await canvasToBlob(cv,"image/jpeg",0.9);
    const file=new File([blob],"skizze.jpg",{type:"image/jpeg"});
    const p=App.protocol;
    if(p.floorplan&&p.floorplan.imageId)await DB.delImage(p.floorplan.imageId);
    const r=await storeImage(file,{maxEdge:1400,quality:0.9});
    const hadRooms=p.rooms.length>0;
    p.floorplan={imageId:r.id,w:r.w,h:r.h};
    await saveNow(); window.removeEventListener("mouseup",up); closeModal(); viewGrundriss(qs("#view")); toast("Skizze als Grundriss gespeichert","ok");
    if(!hadRooms) setTimeout(()=>suggestRoomsFlow(true),260);
  };
  foot.append(cancel,save);
  openModal({title:"Grundriss skizzieren",body,footer:foot,size:"lg",onClose:()=>window.removeEventListener("mouseup",up)});
}

/* Best-effort Aufnahme-Kontext: Zeitstempel immer, GPS nur wenn aktiviert (grob, nie blockierend) */
function captureContext(){
  return new Promise(res=>{
    const meta={ at:new Date().toISOString() };
    if(!App.settings.geo || !navigator.geolocation){ return res(meta); }
    let done=false; const finish=()=>{ if(!done){ done=true; res(meta); } };
    const t=setTimeout(finish,3500);
    try{
      navigator.geolocation.getCurrentPosition(
        pos=>{ clearTimeout(t); meta.gps={ lat:pos.coords.latitude, lng:pos.coords.longitude, acc:pos.coords.accuracy }; finish(); },
        ()=>{ clearTimeout(t); finish(); },
        { enableHighAccuracy:true, timeout:3000, maximumAge:10000 }
      );
    }catch(_){ clearTimeout(t); finish(); }
  });
}

function replaceEntryPhoto(e, useCamera){
  const p=App.protocol;
  if(!e.imageId && usedImageCount(p)>=IMG_LIMIT){ toast("Bildlimit erreicht ("+IMG_LIMIT+").","err"); return; }
  const inp=el('<input type="file" accept="image/*" class="hidden"'+(useCamera?' capture="environment"':'')+'>');
  document.body.appendChild(inp);
  inp.onchange=async ()=>{
    const file=inp.files&&inp.files[0]; inp.remove(); if(!file)return;
    try{
      toast("Bild wird verarbeitet …");
      const old=e.imageId;
      const r=await storeImage(file);
      e.imageId=r.id;
      if(old) await DB.delImage(old);
      if(!e.meta||!e.meta.at){ e.meta=Object.assign({},e.meta,await captureContext()); }
      await saveNow(); viewAufnahmen(qs("#view")); toast("Foto gespeichert","ok");
    }catch(err){ console.error(err); toast("Bild konnte nicht verarbeitet werden.","err"); }
  };
  inp.click();
}

function capturePhotos(useCamera){
  const p=App.protocol;
  if(usedImageCount(p)>=IMG_LIMIT){ toast("Bildlimit erreicht ("+IMG_LIMIT+"). Entferne Bilder, um neue aufzunehmen.","err"); return; }
  const inp=el('<input type="file" accept="image/*" class="hidden"'+(useCamera?' capture="environment"':' multiple')+'>');
  document.body.appendChild(inp);
  inp.onchange=async ()=>{
    const files=Array.from(inp.files||[]); inp.remove(); if(!files.length)return;
    let free=IMG_LIMIT-usedImageCount(p);
    if(files.length>free){ toast("Nur "+free+" weitere Bilder möglich – die übrigen wurden übersprungen.","err"); }
    const todo=files.slice(0,Math.max(0,free));
    if(!todo.length)return;
    toast(todo.length>1?(todo.length+" Bilder werden verarbeitet …"):"Bild wird verarbeitet …");
    const meta=await captureContext();
    const created=[];
    for(const file of todo){
      try{
        const r=await storeImage(file);
        const ent={ id:uid("ent"), roomId:App._lastRoom||null, imageId:r.id, title:"", description:"", severity:"keine", category:"zustand", befunde:[], pin:null, meta:Object.assign({},meta) };
        p.entries.push(ent); created.push(ent);
      }catch(err){ console.error(err); toast("Ein Bild konnte nicht verarbeitet werden.","err"); }
    }
    App._focusEntry = created.length ? created[created.length-1].id : null;
    await saveNow(); viewAufnahmen(qs("#view"));
    // Ein-Zug-Fluss: nach Einzelaufnahme direkt Erkennung → Beschreibung (→ Verortung)
    if(created.length===1 && created[0].imageId){ setTimeout(()=>runRecognition(created[0],{ chainPin:true }),120); }
    else if(created.length){ toast("Hinzugefügt. Tippe auf „Schaden erkennen\" für Befundvorschläge.","ok"); }
  };
  inp.click();
}

function destroySigPads(){ (App._sigPads||[]).forEach(p=>{ try{p.destroy();}catch(e){} }); App._sigPads=[]; }

function viewUnterschriften(c){
  destroySigPads();
  const p=App.protocol;
  c.classList.add("view-narrow");
  c.innerHTML="";
  const head=el('<div class="section-head"><div class="sh-text"><div class="eyebrow">Abschluss</div><h3 style="font-size:21px;margin-top:6px">Unterschriften</h3><p>Beide Parteien bestätigen die Richtigkeit und Vollständigkeit des Protokolls.</p></div></div>');
  c.appendChild(head);

  // Ort & Datum
  const od=el('<div class="card card-pad" style="margin-bottom:18px"></div>');
  const grid=el('<div class="grid" style="grid-template-columns:1fr 1fr;gap:12px"></div>');
  grid.appendChild(boundField({label:"Ort der Unterzeichnung",path:"ortUnterzeichnung",placeholder:"z. B. Berlin"}));
  const dField=el('<div class="field" style="margin:0"><label>Datum</label><input class="inp" type="date"></div>');
  dField.querySelector("input").value=dateInputValue(p.signatures.datum||p.datum);
  dField.querySelector("input").addEventListener("input",ev=>{ p.signatures.datum=ev.target.value?new Date(ev.target.value+"T12:00:00").toISOString():""; scheduleSave(); });
  grid.appendChild(dField);
  od.appendChild(grid);
  c.appendChild(od);

  // Bestätigungstext
  const conf=el('<div class="card card-pad" style="margin-bottom:18px;background:var(--paper-2)"></div>');
  conf.appendChild(el('<p style="margin:0;font-size:13px;color:var(--ink-2);line-height:1.6">Mit ihrer Unterschrift bestätigen beide Parteien, dass die im Protokoll festgehaltenen Angaben, der Zustand der Räume, die dokumentierten Mängel sowie die Zähler- und Schlüsselangaben dem tatsächlichen Zustand bei Übergabe entsprechen.</p>'));
  c.appendChild(conf);

  [["uebergeber","Übergebende Partei"],["uebernehmer","Übernehmende Partei"]].forEach(([key,label])=>{
    const party=p.parties[key]||{};
    const card=el('<div class="card card-pad" style="margin-bottom:18px"></div>');
    card.appendChild(el('<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px"><div class="lbl">'+label+'</div><div style="font-size:13px;color:var(--ink-3)">'+escapeHtml(party.name||"—")+'</div></div>'));
    card.appendChild(el('<div style="font-size:12px;color:var(--ink-4);margin-bottom:10px">'+escapeHtml(party.rolle||"")+'</div>'));
    const padWrap=el('<div style="position:relative;border:1.5px dashed var(--line);border-radius:10px;background:#fff;overflow:hidden"></div>');
    const canvas=el('<canvas style="width:100%;height:170px;display:block;touch-action:none"></canvas>');
    padWrap.appendChild(canvas);
    const base=el('<div style="position:absolute;left:14px;right:14px;bottom:12px;border-top:1px solid var(--line-2);pointer-events:none"></div>');
    padWrap.appendChild(base);
    card.appendChild(padWrap);
    const bar=el('<div style="display:flex;gap:8px;margin-top:10px;align-items:center"></div>');
    const clr=el('<button class="btn btn-ghost btn-sm">Löschen</button>');
    const status=el('<span style="margin-left:auto;font-size:12px;color:var(--ink-4)"></span>');
    bar.append(clr,status); card.appendChild(bar);
    c.appendChild(card);

    setTimeout(()=>{
      const pad=SignaturePad(canvas);
      App._sigPads.push(pad);
      if(p.signatures[key]){ pad.load(p.signatures[key]); status.textContent="✓ unterschrieben"; status.style.color="var(--ok)"; }
      let saveT=null;
      const persist=()=>{ clearTimeout(saveT); saveT=setTimeout(()=>{ p.signatures[key]=pad.toDataURL(); status.textContent=pad.isEmpty()?"":"✓ unterschrieben"; status.style.color=pad.isEmpty()?"var(--ink-4)":"var(--ok)"; scheduleSave(); },300); };
      canvas.addEventListener("mouseup",persist); canvas.addEventListener("touchend",persist);
      clr.onclick=()=>{ pad.clear(); p.signatures[key]=null; status.textContent=""; scheduleSave(); };
    },30);
  });

  const note=el('<p style="font-size:12px;color:var(--ink-4);text-align:center;margin:6px 0 0">Unterschriften werden lokal im Protokoll gespeichert und erscheinen im Export.</p>');
  c.appendChild(note);
}

/* In-App-Vorschau (iframe, offline) + Aktionen */
async function previewProtocol(btn){
  const old=btn?btn.innerHTML:null; if(btn){ btn.disabled=true; btn.innerHTML='<span class="spin"></span>Erzeuge …'; }
  try{
    const html=await buildProtocolHTML(App.protocol);
    const wrap=el('<div></div>');
    const bar=el('<div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap"></div>');
    const pr=el('<button class="btn btn-pri btn-sm">'+IC.print+'Drucken / als PDF</button>'); pr.onclick=()=>printHTML(html);
    const sv=el('<button class="btn btn-sec btn-sm">'+IC.doc+'HTML speichern</button>'); sv.onclick=()=>saveHTML(html);
    bar.append(pr,sv);
    const note=el('<div class="hint" style="margin-bottom:8px">In dieser In-App-Vorschau werden Bilder je nach Umgebung evtl. nicht angezeigt – in der gespeicherten HTML-Datei und beim Drucken sind alle Fotos, der Grundriss und die Räume vollständig enthalten.</div>');
    const frame=el('<iframe title="Protokoll-Vorschau" style="width:100%;height:60vh;border:1px solid var(--line);border-radius:10px;background:#fff"></iframe>');
    frame.setAttribute("srcdoc",html);
    wrap.append(bar,note,frame);
    openModal({ title:"Protokoll-Vorschau", body:wrap, size:"lg" });
  }catch(err){ console.error(err); toast("Vorschau-Fehler: "+err.message,"err"); }
  finally{ if(btn){ btn.disabled=false; btn.innerHTML=old; } }
}

/* Druck über verstecktes iframe – ohne Popup-Fenster (webview-tauglich) */
function printHTML(html){
  const ifr=document.createElement("iframe");
  ifr.setAttribute("aria-hidden","true");
  ifr.style.cssText="position:fixed;right:0;bottom:0;width:0;height:0;border:0;opacity:0";
  document.body.appendChild(ifr);
  const run=()=>{ try{ ifr.contentWindow.focus(); ifr.contentWindow.print(); }catch(_){ toast("Drucken in dieser Ansicht nicht möglich – nutze „HTML speichern\".","err"); } finally{ setTimeout(()=>ifr.remove(),1500); } };
  try{
    const doc=ifr.contentWindow.document; doc.open(); doc.write(html); doc.close();
    setTimeout(run,350);
  }catch(_){ ifr.remove(); toast("Drucken nicht möglich – nutze „HTML speichern\".","err"); }
}
function saveHTML(html){
  const blob=new Blob([html],{type:"text/html;charset=utf-8"});
  downloadBlob(blob,_protoFileBase(App.protocol)+".html");
  toast("HTML-Datei gespeichert","ok");
}
async function exportHTMLFile(btn){
  const old=btn.innerHTML; btn.disabled=true; btn.innerHTML='<span class="spin"></span>Erzeuge …';
  try{ saveHTML(await buildProtocolHTML(App.protocol)); }
  catch(err){ console.error(err); toast("HTML-Fehler: "+err.message,"err"); }
  finally{ btn.disabled=false; btn.innerHTML=old; }
}
async function exportPrint(){
  try{ printHTML(await buildProtocolHTML(App.protocol)); }
  catch(err){ console.error(err); toast("Druck-Fehler: "+err.message,"err"); }
}

/* ===== ZIP ohne externe Bibliothek (Store-Methode, offline) ===== */
function crc32(buf){
  let c=~0>>>0;
  for(let i=0;i<buf.length;i++){ c^=buf[i]; for(let k=0;k<8;k++){ c=(c>>>1)^(0xEDB88320 & -(c&1)); } }
  return (~c)>>>0;
}
function zipStore(files){
  const enc=new TextEncoder();
  const u16=v=>[v&255,(v>>8)&255];
  const u32=v=>[v&255,(v>>8)&255,(v>>16)&255,(v>>24)&255];
  const parts=[]; const central=[]; let offset=0; const dosT=0, dosD=0x21;
  for(const f of files){
    const name=enc.encode(f.name); const data=f.data; const crc=crc32(data); const len=data.length>>>0;
    const local=[0x50,0x4b,0x03,0x04].concat(u16(20),u16(0),u16(0),u16(dosT),u16(dosD),u32(crc),u32(len),u32(len),u16(name.length),u16(0));
    parts.push(Uint8Array.from(local), name, data);
    const cen=[0x50,0x4b,0x01,0x02].concat(u16(20),u16(20),u16(0),u16(0),u16(dosT),u16(dosD),u32(crc),u32(len),u32(len),u16(name.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset));
    central.push(Uint8Array.from(cen), name);
    offset += local.length + name.length + data.length;
  }
  let cenSize=0; central.forEach(c=>cenSize+=c.length);
  const end=[0x50,0x4b,0x05,0x06].concat(u16(0),u16(0),u16(files.length),u16(files.length),u32(cenSize),u32(offset),u16(0));
  return new Blob(parts.concat(central,[Uint8Array.from(end)]),{type:"application/zip"});
}
async function exportZIP(btn){
  const old=btn.innerHTML; btn.disabled=true; btn.innerHTML='<span class="spin"></span>Packe …';
  try{
    const p=App.protocol; const files=[]; let n=0;
    const buf=async blob=>new Uint8Array(await blob.arrayBuffer());
    for(let i=0;i<(p.entries||[]).length;i++){ const e=p.entries[i]; if(!e.imageId)continue; const r=await DB.getImage(e.imageId); if(!r)continue;
      const room=(entryRoomName(p,e)||"unzugeordnet").replace(/[^\w]+/g,"-");
      const name=String(i+1).padStart(2,"0")+"_"+room+"_"+(e.title||"aufnahme").replace(/[^\w]+/g,"-").slice(0,30)+".jpg";
      files.push({ name:"fotos/"+name, data:await buf(r.blob) }); n++; }
    for(let i=0;i<(p.meters||[]).length;i++){ const m=p.meters[i]; if(!m.imageId)continue; const r=await DB.getImage(m.imageId); if(!r)continue;
      files.push({ name:"fotos/zaehler_"+(METER_TYPES[m.type]||"zaehler").replace(/[^\w]+/g,"-")+"_"+(i+1)+".jpg", data:await buf(r.blob) }); n++; }
    if(p.floorplan&&p.floorplan.imageId){ const r=await DB.getImage(p.floorplan.imageId); if(r) files.push({ name:"grundriss.jpg", data:await buf(r.blob) }); }
    if(!files.length){ toast("Keine Fotos vorhanden.","err"); return; }
    const blob=zipStore(files);
    downloadBlob(blob,"Uebergabe_Fotos_"+(((p.object||{}).strasse)||"Objekt").replace(/[^\w]+/g,"-")+".zip");
    toast(n+" Fotos exportiert","ok");
  }catch(err){ console.error(err); toast("ZIP-Fehler: "+err.message,"err"); }
  finally{ btn.disabled=false; btn.innerHTML=old; }
}

/* ---- JSON Backup/Import ---- */
async function exportJSON(btn){
  const old=btn.innerHTML; btn.disabled=true; btn.innerHTML='<span class="spin"></span>Sichere …';
  try{
    const p=App.protocol; const images={};
    const ids=new Set(); (p.entries||[]).forEach(e=>e.imageId&&ids.add(e.imageId)); (p.meters||[]).forEach(m=>m.imageId&&ids.add(m.imageId)); if(p.floorplan&&p.floorplan.imageId)ids.add(p.floorplan.imageId);
    for(const id of ids){ const r=await DB.getImage(id); if(r){ images[id]={ data:await blobToDataURL(r.blob), thumb:r.thumb?await blobToDataURL(r.thumb):null, w:r.w, h:r.h, bytes:r.bytes }; } }
    const pack={ format:"uebergabe-backup", version:1, exportedAt:new Date().toISOString(), protocol:p, images };
    const blob=new Blob([JSON.stringify(pack)],{type:"application/json"});
    downloadBlob(blob,"Uebergabe_Backup_"+((p.object||{}).strasse||"Objekt").replace(/[^\w]+/g,"-")+"_"+dateInputValue(p.datum)+".json");
    toast("Backup gespeichert","ok");
  }catch(err){ console.error(err); toast("Backup-Fehler: "+err.message,"err"); }
  finally{ btn.disabled=false; btn.innerHTML=old; }
}

function importJSON(){
  const inp=el('<input type="file" accept="application/json,.json" class="hidden">');
  document.body.appendChild(inp);
  inp.onchange=async ()=>{
    const file=inp.files[0]; inp.remove(); if(!file)return;
    try{
      const text=await file.text(); const pack=JSON.parse(text);
      if(pack.format!=="uebergabe-backup"||!pack.protocol) throw new Error("Kein gültiges Backup.");
      const ok=await confirmDialog("Backup importieren?","Das aktuelle Protokoll wird mit den Daten aus dem Backup überschrieben. Fortfahren?","Importieren");
      if(!ok)return;
      toast("Importiere …");
      const np=migrateProtocol(pack.protocol);
      // Bilder neu in DB schreiben (IDs beibehalten)
      const imgs=pack.images||{};
      for(const id of Object.keys(imgs)){ const it=imgs[id]; const blob=await (await fetch(it.data)).blob(); const thumb=it.thumb?await (await fetch(it.thumb)).blob():null; await DB.putImage({ id, blob, thumb, w:it.w, h:it.h, bytes:it.bytes||blob.size, type:"image/jpeg", createdAt:new Date().toISOString() }); }
      np.id=App.protocol.id; // in aktuelles Protokoll übernehmen
      App.protocol=np; await saveNow();
      toast("Backup importiert","ok"); go("stammdaten");
    }catch(err){ console.error(err); toast("Import-Fehler: "+err.message,"err"); }
  };
  inp.click();
}

function downloadBlob(blob,filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{ a.remove(); URL.revokeObjectURL(url); },1500);
}

/* ===================== Start / Boot ===================== */
async function boot(){
  try{
    await DB.open();
    await loadSettings();
    await Learn.load();
    requestPersistence();
    App.view="dashboard";
    renderShell();
  }catch(err){
    console.error(err);
    App.el.innerHTML='<div class="boot-error"><div class="ic">'+IC.warn+'</div><h2>Speicher nicht verfügbar</h2>'+
      '<p>Diese Anwendung benötigt IndexedDB. Bitte nutze einen aktuellen Browser ohne privaten/Inkognito-Modus mit eingeschränktem Speicher.</p>'+
      '<p style="font-family:var(--f-mono);font-size:12px;color:var(--ink-4);margin-top:10px">'+escapeHtml(err.message||String(err))+'</p></div>';
  }
}
if(typeof document!=="undefined" && typeof window!=="undefined" && !window.__TEST__){
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",boot); else boot();
}
